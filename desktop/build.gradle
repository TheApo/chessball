sourceCompatibility = 17
targetCompatibility = 17
sourceSets.main.java.srcDirs = [ "src/" ]
sourceSets.main.resources.srcDirs = ["../assets"]

project.ext.mainClassName = "com.apogames.chessball.desktop.DesktopLauncher"
project.ext.assetsDir = new File("../assets")

import org.gradle.internal.os.OperatingSystem

task run(dependsOn: classes, type: JavaExec) {
    mainClass.set(project.mainClassName)
    classpath = sourceSets.main.runtimeClasspath
    standardInput = System.in
    workingDir = project.assetsDir
    ignoreExitValue = true

    if (OperatingSystem.current() == OperatingSystem.MAC_OS) {
        // Required to run on macOS
        jvmArgs += "-XstartOnFirstThread"
    }
}

task solverCheck(dependsOn: classes, type: JavaExec) {
    mainClass.set("com.apogames.chessball.solver.PuzzleSolverMain")
    classpath = sourceSets.main.runtimeClasspath
    standardInput = System.in
    workingDir = project.assetsDir
    ignoreExitValue = true
}

// Headless self-play harness — runs many AI-vs-AI games and writes a populated
// transposition table that ships in assets/ai/tt.txt (where Gdx.files.internal
// looks for it at runtime).
//   ./gradlew desktop:runSelfPlay --args="--games 100 --white Hard --black Hard"
// workingDir is the repo root so the default --out path "assets/ai/tt.txt"
// resolves correctly.
task runSelfPlay(dependsOn: classes, type: JavaExec) {
    mainClass.set("com.apogames.chessball.desktop.SelfPlayMain")
    classpath = sourceSets.main.runtimeClasspath
    standardInput = System.in
    workingDir = rootProject.projectDir
    ignoreExitValue = true
}

task debug(dependsOn: classes, type: JavaExec) {
    mainClass.set(project.mainClassName)
    classpath = sourceSets.main.runtimeClasspath
    standardInput = System.in
    workingDir = project.assetsDir
    ignoreExitValue = true
    debug = true
}

task dist(type: Jar) {
    duplicatesStrategy(DuplicatesStrategy.EXCLUDE)
    manifest {
        attributes 'Main-Class': project.mainClassName
    }
    dependsOn configurations.runtimeClasspath
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
    with jar
}


dist.dependsOn classes

eclipse.project.name = appName + "-desktop"
